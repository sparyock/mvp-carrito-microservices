databaseChangeLog:
  - changeSet:
      id: 002-create-carrito-detalle-table
      author: yeison

      changes:
        - createTable:
            tableName: carrito_detalle
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: carrito_id
                  type: BIGINT

              - column:
                  name: producto_id
                  type: BIGINT

              - column:
                  name: cantidad
                  type: INT

              - column:
                  name: precio
                  type: DOUBLE PRECISION