databaseChangeLog:
  - changeSet:
      id: 001-create-carritos-table
      author: yeison

      changes:
        - createTable:
            tableName: carritos
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: usuario_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: fecha_creacion
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP