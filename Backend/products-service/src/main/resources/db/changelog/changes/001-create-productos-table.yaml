databaseChangeLog:
  - changeSet:
      id: 001-create-productos-table
      author: yeison

      changes:
        - createTable:
            tableName: productos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nombre
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: descripcion
                  type: VARCHAR(500)
                  constraints:
                    nullable: false

              - column:
                  name: precio
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false

              - column:
                  name: stock
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: imagen_url
                  type: VARCHAR(500)