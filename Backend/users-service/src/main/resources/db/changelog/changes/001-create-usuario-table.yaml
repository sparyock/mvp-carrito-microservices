databaseChangeLog:
  - changeSet:
      id: 001-create-usuario-table
      author: yeison

      changes:
        - createTable:
            tableName: usuarios
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nombre
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: correo
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false